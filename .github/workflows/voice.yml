name: Generate Voiceover (STATE 13)

# CRAH STATE 13 — runs the ElevenLabs voice adapter in GitHub's cloud (full
# internet, no laptop, no Claude session). Manual / API trigger only.
#
# Key source (either works):
#   - a repo secret ELEVENLABS_API_KEY (preferred, encrypted at rest), OR
#   - the one-time `api_key` dispatch input below (masked in logs).
# Voice id: optional `voice_id` input / ELEVENLABS_VOICE_ID secret; otherwise a
# calm deadpan male premade voice ("Daniel") is used.
# Output: narration mp3, uploaded as the run's "narration-mp3" artifact.

on:
  workflow_dispatch:
    inputs:
      script_path:
        description: "Path to the narration script (.txt)"
        default: "voice/eunuch-script.txt"
        required: true
      api_key:
        description: "ElevenLabs API key (one-time; leave blank to use the ELEVENLABS_API_KEY secret)"
        required: false
        default: ""
      voice_id:
        description: "ElevenLabs voice id (blank = default calm male narrator)"
        required: false
        default: ""

jobs:
  tts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Mask the API key in logs
        env:
          K: ${{ github.event.inputs.api_key }}
        run: if [ -n "$K" ]; then echo "::add-mask::$K"; fi

      - name: Install ffmpeg helper
        run: pip install imageio-ffmpeg

      - name: Synthesize narration
        env:
          ELEVENLABS_API_KEY: ${{ github.event.inputs.api_key || secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ github.event.inputs.voice_id || secrets.ELEVENLABS_VOICE_ID || 'onwK4e9ZLuTAKqWW03F9' }}
        run: python tools/synthesize.py "${{ github.event.inputs.script_path }}" -o voice/narration.mp3

      - name: Upload narration mp3
        uses: actions/upload-artifact@v4
        with:
          name: narration-mp3
          path: voice/narration.mp3
          if-no-files-found: error
